# NEXUS OS v1.1 — GRUB Boot Configuration
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod gfxterm

set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# Critical: Find ISO root by volume label
search --no-floppy --label --set=root "NEXUS_OS_1_1"

menuentry "NEXUS OS 1.1 — Agentic AI Linux" --class nexus --class gnu-linux {
    echo "Initialising NEXUS Brain v1.1..."
    linux  /boot/vmlinuz boot=live components quiet splash \
           console=tty1 hostname=nexus username=root noswap noeject
    initrd /boot/initrd.img
}

menuentry "NEXUS OS 1.1 — Safe Mode" --class nexus {
    echo "NEXUS Safe Mode..."
    linux  /boot/vmlinuz boot=live components \
           console=tty1 hostname=nexus noswap debug
    initrd /boot/initrd.img
}

menuentry "NEXUS OS 1.1 — RAM Mode (toram)" --class nexus {
    echo "Loading into RAM..."
    linux  /boot/vmlinuz boot=live components toram \
           console=tty1 hostname=nexus noswap
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" --class hdd {
    set root=(hd0)
    chainloader +1
}
