# ============================================================
#  NEXUS OS — GRUB Boot Configuration (Fixed)
# ============================================================

# Load required modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod gfxterm
insmod gfxmenu

set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# ── Critical Fix: Search ISO root by volume label ──────────
# Without this, GRUB cannot find /boot/vmlinuz
search --no-floppy --label --set=root "NEXUS_OS_1_0"

# ── Menu Entries ───────────────────────────────────────────

menuentry "NEXUS OS 1.0 — Agentic AI Linux" --class nexus --class gnu-linux {
    echo "Initialising NEXUS Brain..."
    linux  /boot/vmlinuz \
           boot=live \
           components \
           quiet \
           splash \
           console=tty1 \
           hostname=nexus \
           username=root \
           noswap \
           noeject
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — Safe Mode (no splash)" --class nexus {
    echo "NEXUS Safe Mode..."
    linux  /boot/vmlinuz \
           boot=live \
           components \
           console=tty1 \
           hostname=nexus \
           username=root \
           noswap \
           noeject \
           debug
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — RAM Mode (toram)" --class nexus {
    echo "Loading into RAM..."
    linux  /boot/vmlinuz \
           boot=live \
           components \
           toram \
           console=tty1 \
           hostname=nexus \
           noswap
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" --class hdd {
    set root=(hd0)
    chainloader +1
}
