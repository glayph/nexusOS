set default=0
set timeout=2
set gfxmode=keep
set gfxpayload=text

insmod all_video
insmod gfxterm
insmod iso9660
insmod search_label
insmod linux
insmod initrd
insmod part_msdos
insmod part_gpt

search --no-floppy --label --set=root "NEXUS_OS_1_0"

menuentry "Nexus OS" {
  linux /boot/vmlinuz boot=live components quiet hostname=nexus \
    loglevel=3 udev.log_priority=3 rd.systemd.show_status=false \
    noresume noprompt systemd.default_timeout_start_sec=5 \
    modprobe.blacklist=vmwgfx persistent
  initrd /boot/initrd.img
}

menuentry "Nexus OS (verbose)" {
  linux /boot/vmlinuz boot=live components hostname=nexus
  initrd /boot/initrd.img
}

menuentry "Boot from first disk" {
  set root=(hd0,msdos1)
  chainloader +1
}
