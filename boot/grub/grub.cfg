set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod iso9660
insmod search_label
insmod linux
insmod initrd
insmod part_msdos
insmod part_gpt

search --no-floppy --label --set=root "NEXUS_OS_1_0"

menuentry "Nexus OS" {
  linux /boot/vmlinuz boot=live components quiet hostname=nexus
  initrd /boot/initrd.img
}

menuentry "Nexus OS (safe mode)" {
  linux /boot/vmlinuz boot=live components hostname=nexus
  initrd /boot/initrd.img
}

menuentry "Boot from first disk" {
  set root=(hd0,msdos1)
  chainloader +1
}
