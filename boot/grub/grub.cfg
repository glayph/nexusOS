# ============================================================
#  NEXUS OS — GRUB Boot Configuration (Fixed v2)
# ============================================================

set default=0
set timeout=5

# Find ISO root by volume label
search --no-floppy --label --set=root "NEXUS_OS_1_0"

menuentry "NEXUS OS 1.0 — Agentic AI Linux" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           quiet \
           hostname=nexus \
           username=root \
           noswap
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — Safe Mode (no splash)" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           hostname=nexus \
           noswap
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — RAM Mode (toram)" {
    linux  /boot/vmlinuz \
           boot=live \
           components \
           toram \
           hostname=nexus \
           noswap
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" {
    set root=(hd0,1)
    chainloader +1
}
