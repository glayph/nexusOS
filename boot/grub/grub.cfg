# NEXUS OS — GRUB Boot Configuration
set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep

# Load video support
insmod all_video
insmod gfxterm
terminal_output gfxterm

# Colour theme
set color_normal=cyan/black
set color_highlight=white/blue
set menu_color_normal=cyan/black
set menu_color_highlight=black/cyan

menuentry "NEXUS OS 1.0 — Agentic AI Linux" --class nexus --class gnu-linux {
    echo "Initialising NEXUS Brain..."
    linux  /boot/vmlinuz boot=live quiet splash \
           console=tty1 \
           root=/dev/ram0 \
           init=/sbin/init \
           nexus.agent=enabled \
           nexus.version=1.0
    initrd /boot/initrd.img
}

menuentry "NEXUS OS — Safe Mode (no splash)" --class nexus {
    echo "NEXUS Safe Mode..."
    linux  /boot/vmlinuz boot=live \
           console=tty1 \
           root=/dev/ram0 \
           init=/sbin/init
    initrd /boot/initrd.img
}

menuentry "Boot from first hard disk" --class hdd {
    chainloader +1
}
