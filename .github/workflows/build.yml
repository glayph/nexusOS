name: Build Nexus OS ISO

on:
  push:
    branches: [main]
    paths:
      - 'nexus-agent.py'
      - 'boot/**'
      - 'customize/**'
      - 'makebuild.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo bash install-deps.sh

      - name: Build nexus.iso
        run: sudo bash makebuild.sh --output ${{ github.workspace }}

      - name: Show ISO info
        run: |
          ls -lh nexus.iso
          sha256sum nexus.iso | tee SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: "Nexus OS v1.0 — Agentic AI Linux"
          body: |
            ## 🚀 Nexus OS v1.0

            ### Download
            Download **`nexus.iso`** below ↓

            ### Quick Start
            ```bash
            # Flash to USB
            dd if=nexus.iso of=/dev/sdX bs=4M status=progress

            # Or test in QEMU
            qemu-system-x86_64 -m 2048 -cdrom nexus.iso -boot d -enable-kvm

            # After boot — set your Anthropic API key
            echo "sk-ant-..." > /etc/nexus/api.key
            ```

            ### Specs
            | Item | Detail |
            |---|---|
            | Base | Ubuntu 24.04 Noble |
            | Kernel | Linux 6.8.x |
            | Boot | BIOS + UEFI |
            | AI Agent | Anthropic claude-sonnet-4-6 |
          files: |
            nexus.iso
            SHA256SUMS
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
