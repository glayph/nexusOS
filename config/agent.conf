# /etc/nexus/agent.conf — AI Agent Provider Config
# ============================================================
# AGENT_PROVIDER: anthropic | openai | local | external | disabled
AGENT_PROVIDER=anthropic
AGENT_MODEL=claude-sonnet-4-6
AGENT_API_KEY_FILE=/etc/nexus/api.key
MAX_HISTORY=40
AUDIT_LOG=/var/log/nexus/audit.log
CONFIRM_DESTRUCTIVE=true
SKILLS_DIR=/opt/nexus/skills

# ── External Agent (OpenClaw / Hermes / অন্য) ──────────────
# AGENT_PROVIDER=external হলে নিচেরটা set করো:
# EXTERNAL_AGENT_CMD=/usr/bin/openclaw
# EXTERNAL_AGENT_ARGS=--interactive

# ── Local AI (Ollama) ────────────────────────────────────────
# AGENT_PROVIDER=local হলে:
# LOCAL_MODEL=llama3
# LOCAL_ENDPOINT=http://localhost:11434/api/chat

# ── OpenAI ──────────────────────────────────────────────────
# AGENT_PROVIDER=openai হলে:
# AGENT_MODEL=gpt-4o
